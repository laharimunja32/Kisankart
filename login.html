<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kisankart • Login</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card" aria-label="Login">
        <header class="auth-header">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">K</div>
            <div class="brand-text">
              <div class="brand-name">Kisankart</div>
              <div class="brand-tagline">Organic, direct-from-farm</div>
            </div>
          </div>
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Sign in to continue.</p>
        </header>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="field">
            <label for="email" class="label">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              inputmode="email"
              placeholder="you@example.com"
              required
            />
            <div class="field-hint" id="emailHint">Format: `name@example.com`</div>
            <div class="field-error" id="emailError" role="alert"></div>
          </div>

          <div class="field">
            <label for="password" class="label">Password</label>
            <div class="password-row">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Your password"
                minlength="8"
                required
              />
              <button class="ghost-btn" type="button" id="togglePassword" aria-label="Show password">
                Show
              </button>
            </div>
            <div class="field-hint">
              Min 8 chars, include uppercase, lowercase, number, special (example: `Kisan@1234`)
            </div>
            <div class="field-error" id="passwordError" role="alert"></div>
          </div>

          <div class="row-between">
            <label class="checkbox">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>
            <a class="link" href="forgot-password.html" id="forgotLink">Forgot password?</a>
          </div>

          <button class="primary-btn" type="submit" id="submitBtn">
            Sign in
          </button>

          <div class="form-error" id="formError" role="alert"></div>
        </form>

        <footer class="auth-footer">
          <div class="demo-note">
            Example:
            <button class="chip" type="button" id="fillDemo">Fill example credentials</button>
          </div>
          <div class="fineprint">
            By continuing, you agree to our <a class="link" href="terms.html">Terms</a> and
            <a class="link" href="privacy.html">Privacy Policy</a>.
          </div>
        </footer>
      </section>
    </main>

    <script src="assets/auth.js"></script>
    <script src="assets/login.js"></script>
  </body>
</html>
