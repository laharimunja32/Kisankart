<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kisankart • Reset password</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card" aria-label="Reset password">
        <header class="auth-header">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">K</div>
            <div class="brand-text">
              <div class="brand-name">Kisankart</div>
              <div class="brand-tagline">Password reset</div>
            </div>
          </div>
          <h1 class="auth-title">Forgot your password?</h1>
          <p class="auth-subtitle">Enter your email and we’ll send you a reset link.</p>
        </header>

        <form id="resetForm" class="auth-form" novalidate>
          <div class="field">
            <label for="email" class="label">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              inputmode="email"
              placeholder="you@example.com"
              required
            />
            <div class="field-error" id="emailError" role="alert"></div>
          </div>

          <button class="primary-btn" type="submit" id="submitBtn">Send reset link</button>

          <div class="form-error" id="formError" role="alert"></div>
          <div class="form-success" id="successMsg" aria-live="polite"></div>
          <div class="field-hint" id="hint">
            If an account exists for this email, you’ll receive password reset instructions.
          </div>
        </form>

        <footer class="auth-footer">
          <div class="fineprint">
            <a class="link" href="login.html">Back to login</a>
          </div>
        </footer>
      </section>
    </main>

    <script src="assets/forgot-password.js"></script>
  </body>
</html>
